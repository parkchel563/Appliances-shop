<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title th:text="#{error.title}">Error</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: main_header(${currentPage})}"></div>

<div class="auth-page-wrapper">
    <div class="auth-page-container">
        <div class="auth-form-wrapper">
            <div class="login-card text-center">

                <i class="bi bi-exclamation-triangle-fill login-icon"
                   th:classappend="${status == 404} ? ' text-warning' : ' text-danger'"></i>

                <h1 class="mb-2" th:text="${status}">500</h1>

                <h3 class="mb-3"
                    th:text="${status == 404} ? #{error.404} :
                             (${status == 403} ? #{error.403} : #{error.500})">
                    Error
                </h3>

                <p class="text-light mb-2" th:text="${message}">
                    Something went wrong.
                </p>

                <p class="small text-light mb-4">
                    <i class="bi bi-link-45deg me-1"></i>
                    <em th:text="${path}">/path</em>
                </p>

                <div class="d-flex flex-column gap-2">
                    <a class="btn btn-primary" th:href="@{/}">
                        <i class="bi bi-house-door me-2"></i>
                        <span th:text="#{error.back.catalog}">Back to catalog</span>
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
