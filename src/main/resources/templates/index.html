<!DOCTYPE html>
<html lang="en"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title th:text="#{appliances.title}">Appliance Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: main_header('/')}"></div>
<div class="container appliances-wrapper">
    <div class="mx-auto" style="max-width: 1250px;">

        <div class="alert alert-success alert-dismissible fade show text-center"
             id="successAlert"
             th:if="${successMessage}">

            <i class="bi bi-check-circle me-2"></i>
            <span th:text="#{${successMessage}}">Added to cart</span>

            <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
        </div>

        <div class="d-flex justify-content-end">
            <div th:replace="~{fragments/sorting :: controls('price,asc', 'price,desc', #{sorting.price.asc}, #{sorting.price.desc})}"></div>
        </div>
    </div>

    <div class="row g-4 align-items-start">
        <div class="col-12 col-lg-3">
            <form method="get" th:action="@{/}" th:object="${criteria}">
                <div class="card appliance-item-card border-0 sticky-lg-top" style="top: 20px;">
                    <div class="card-body p-4">
                        <h5 class="mb-4 text-light">
                            <i class="bi bi-funnel me-2"></i>
                            <span th:text="#{filtering.title}">Filters</span>
                        </h5>

                        <div class="mb-3">
                            <label class="form-label text-secondary" th:text="#{filtering.label.search}">Search</label>
                            <input class="form-control bg-dark text-light border-secondary"
                                   th:field="*{name}"
                                   th:placeholder="#{filtering.name.or.model}"
                                   type="text">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary" th:text="#{categories.label}">Category</label>
                            <select class="form-select bg-dark text-light border-secondary"
                                    th:field="*{category}">
                                <option th:text="#{categories.name}" value="">All categories</option>
                                <option th:each="category : ${categories}"
                                        th:text="#{__${'category.' + category}__}"
                                        th:value="${category}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary"
                                   th:text="#{manufacturers.title}">Manufacturer</label>
                            <select class="form-select bg-dark text-light border-secondary"
                                    th:field="*{manufacturerId}">
                                <option th:text="#{manufacturers.all}" value="">All manufacturers</option>
                                <option th:each="manufacturer : ${manufacturers}"
                                        th:text="${manufacturer.name}"
                                        th:value="${manufacturer.id}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary" th:text="#{powerTypes.header}">Power type</label>
                            <select class="form-select bg-dark text-light border-secondary"
                                    th:field="*{powerType}">
                                <option th:text="#{powerTypes.all}" value="">All power types</option>
                                <option th:each="powerType : ${powerTypes}"
                                        th:text="#{powerType.__${powerType}__}"
                                        th:value="${powerType}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary" th:text="#{filtering.minPower}">Min power</label>
                            <input class="form-control bg-dark text-light border-secondary"
                                   th:field="*{minPower}"
                                   th:placeholder="#{filtering.minPower}"
                                   type="number">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary" th:text="#{filtering.maxPower}">Max power</label>
                            <input class="form-control bg-dark text-light border-secondary"
                                   th:field="*{maxPower}"
                                   th:placeholder="#{filtering.maxPower}"
                                   type="number">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary" th:text="#{filtering.minPrice}">Min price</label>
                            <input class="form-control bg-dark text-light border-secondary"
                                   step="0.01"
                                   th:field="*{minPrice}"
                                   th:placeholder="#{filtering.minPrice}"
                                   type="number">
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-secondary" th:text="#{filtering.maxPrice}">Max price</label>
                            <input class="form-control bg-dark text-light border-secondary"
                                   step="0.01"
                                   th:field="*{maxPrice}"
                                   th:placeholder="#{filtering.maxPrice}"
                                   type="number">
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" type="submit">
                                <i class="bi bi-funnel me-2"></i>
                                <span th:text="#{filtering.footer}">Filter</span>
                            </button>

                            <a class="btn btn-outline-light" th:href="@{/}">
                                <i class="bi bi-arrow-counterclockwise me-2"></i>
                                <span th:text="#{filtering.reset}">Reset</span>
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="col-12 col-lg-9">
            <div class="auth-form-wrapper" th:if="${#lists.isEmpty(appliances)}">
                <div class="login-card text-center">
                    <i class="bi bi-box-seam login-icon"></i>
                    <h3 class="mb-3" th:text="#{appliances.empty}">No appliances found</h3>
                    <p class="text-secondary mb-0" th:text="#{appliances.empty.description}">
                        There are no appliances to display at the moment
                    </p>
                </div>
            </div>

            <div class="row g-4" th:if="${not #lists.isEmpty(appliances)}">
                <div class="col-12 col-md-6 col-xl-4" th:each="appliance : ${appliances}">
                    <div class="card appliance-item-card h-100 border-0">
                        <div class="card-body p-4 d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <span class="appliance-badge"
                                      th:text="#{category.__${appliance.category}__}">SMALL</span>
                                <span class="appliance-price" th:text="${appliance.price} + ' $'">149.00 $</span>
                            </div>

                            <h4 class="appliance-title mb-2" th:text="${appliance.name}">Microwave Oven</h4>

                            <p class="text-secondary mb-3">
                                <span th:text="#{appliances.model}">Model</span>:
                                <span class="text-light" th:text="${appliance.model}">MS23K3513AK</span>
                            </p>

                            <p class="text-secondary mb-4">
                                <span th:text="#{appliances.manufacturer}">Manufacturer</span>:

                                <a class="text-info text-decoration-underline"
                                   sec:authorize="isAuthenticated()"
                                   th:href="@{/(manufacturerId=${appliance.manufacturerId})}"
                                   th:text="${appliance.manufacturerName}">Samsung</a>

                                <span class="text-light"
                                      sec:authorize="isAnonymous()"
                                      th:text="${appliance.manufacturerName}">Samsung</span>
                            </p>
                            <p class="text-secondary mb-4">
                                <span th:text="#{appliances.powerType}">PowerType</span>:
                                <span class="text-light" th:text="${appliance.powerType}"></span>
                            </p>
                            <p class="text-secondary mb-4 d-flex align-items-center gap-2">
                                <i class="bi bi-lightning-charge-fill text-primary"></i>
                                <span th:text="#{appliances.power}">Power</span>
                                <span class="text-light fw-semibold"
                                      th:text="${appliance.power} + ' W'">1150 W</span>
                            </p>


                            <div class="mt-auto d-flex gap-2" sec:authorize="isAnonymous()">
                                <a class="btn btn-outline-light w-100" th:href="@{/login}">
                                    <i class="bi bi-cart-plus me-2"></i>
                                    <span th:text="#{appliances.loginToOrder}">Login to order</span>
                                </a>
                            </div>

                            <div class="mt-auto d-flex gap-2" sec:authorize="hasAuthority('ROLE_CLIENT')">
                                <form class="w-100" method="post" th:action="@{/cart/add/{id}(id=${appliance.id})}">
                                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden">
                                    <button class="btn btn-primary w-100" type="submit">
                                        <i class="bi bi-cart-plus me-2"></i>
                                        <span th:text="#{appliances.addToOrder}">Add to order</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/pagination :: controls(${appliancesPage})}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
    setTimeout(() => {
        const alert = document.getElementById('successAlert');
        if (alert) {
            const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
            bsAlert.close();
        }
    }, 3000);
</script>
</html>
