<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">Appliance Store - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<div th:replace="~{fragments/header :: main_header('login')}"></div>
<div class="auth-page-wrapper">
    <div class="auth-page-container">
        <div class="auth-form-wrapper">
            <div class="login-card text-center">
                <div th:if="${successMessage}" class="alert alert-success mb-3" role="alert">
                    <span th:text="#{${successMessage}}">Employee created successfully</span>
                </div>
                <i class="bi bi-person-vcard login-icon"></i>
                <h2 class="mb-4" th:text="#{login.heading}">Login</h2>

                <div th:if="${param.expired}" class="alert alert-warning py-2 mb-3" role="alert">
                    <span th:text="#{login.expired}">Session expired. Please login again.</span>
                </div>

                <div th:if="${param.logout}" class="alert alert-info py-2 mb-3" role="alert" style="font-size: 0.9rem;">
                    <span th:text="#{login.logout}">You have been logged out.</span>
                </div>

                <div th:if="${param.error != null and param.error[0] == 'locked'}"
                     class="alert alert-danger py-2 mb-3" role="alert">
                    <span th:text="#{login.locked}">Your account is temporarily locked.</span>
                </div>

                <div th:if="${param.error != null and param.error[0] == 'invalid'}"
                     class="alert alert-danger py-2 mb-3 error-msg d-flex align-items-center justify-content-center gap-2"
                     role="alert"
                     style="border-radius: 10px;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="#{login.invalid}">Invalid email or password</span>
                </div>

                <form th:action="@{/login}" method="post" novalidate>
                    <div class="mb-3 text-start">
                        <label class="form-label">
                            <i class="bi bi-envelope me-2"></i>
                            <span th:text="#{login.email}">Email Address</span>
                        </label>
                        <input type="text" name="username" class="form-control" placeholder="name@example.com" required
                               autofocus>
                    </div>

                    <div class="mb-4 text-start">
                        <label class="form-label">
                            <i class="bi bi-lock me-2"></i>
                            <span th:text="#{login.password}">Password</span>
                        </label>
                        <input type="password" name="password" class="form-control" th:placeholder="#{login.password}">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <span th:text="#{login.submit}">Sign In</span>
                        <i class="bi bi-box-arrow-in-right ms-2"></i>
                    </button>
                </form>

                <div class="mt-3">
                    <p class="small text-light me-2">
                        <span th:text="#{login.noAccount}">Don't have an account?</span>
                        <a th:href="@{/signUp}" class="text-decoration-none text-primary" th:text="#{login.signUp}">Sign
                            Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
