<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{signup.title}">Appliance Store - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<div th:replace="~{fragments/header :: main_header('signUp')}"></div>
<div class="auth-page-wrapper">
    <div class="auth-page-container">

        <div class="auth-form-wrapper">
            <div class="login-card text-center">
                <div th:if="${successMessage}" class="alert alert-success mb-3" role="alert">
                    <span th:text="#{${successMessage}}">Account created successfully</span>
                </div>
                <i class="bi bi-person-plus login-icon"></i>
                <h2 class="mb-4" th:text="#{signup.heading}">Create Account</h2>

                <form th:action="@{/signUp}" th:object="${clientRegistrationDto}" method="post" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3 text-start">
                        <label for="name" class="form-label">
                            <i class="bi bi-person me-2"></i>
                            <span th:text="#{signup.name}">Name</span>
                        </label>
                        <input
                                type="text"
                                id="name"
                                th:field="*{name}"
                                class="form-control"
                                th:placeholder="#{signup.name}"
                        >
                        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-msg mt-1"></div>
                    </div>

                    <div class="mb-3 text-start">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope me-2"></i>
                            <span th:text="#{signup.email}">Email Address</span>
                        </label>
                        <input
                                type="email"
                                id="email"
                                th:field="*{email}"
                                class="form-control"
                                placeholder="name@example.com"
                        >
                        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-msg mt-1"></div>
                    </div>

                    <div class="mb-3 text-start">
                        <label for="card" class="form-label">
                            <i class="bi bi-credit-card me-2"></i>
                            <span th:text="#{signup.card}">Card</span>
                        </label>
                        <input
                                type="text"
                                id="card"
                                th:field="*{card}"
                                class="form-control"
                                th:placeholder="#{signup.card}"
                        >
                        <div th:if="${#fields.hasErrors('card')}" th:errors="*{card}" class="error-msg mt-1"></div>
                    </div>

                    <div class="mb-3 text-start">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock me-2"></i>
                            <span th:text="#{signup.password}">Password</span>
                        </label>
                        <input
                                type="password"
                                id="password"
                                th:field="*{password}"
                                class="form-control"
                                th:placeholder="#{signup.password}"
                        >
                        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                             class="error-msg mt-1"></div>
                    </div>

                    <div class="mb-4 text-start">
                        <label for="confirmPassword" class="form-label">
                            <i class="bi bi-shield-lock me-2"></i>
                            <span th:text="#{signup.confirmPassword}">Confirm Password</span>
                        </label>
                        <input
                                type="password"
                                id="confirmPassword"
                                th:field="*{confirmPassword}"
                                class="form-control"
                                th:placeholder="#{signup.confirmPassword}"
                        >
                        <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"
                             class="error-msg mt-1"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <span th:text="#{signup.submit}">Sign Up</span>
                        <i class="bi bi-person-check ms-2"></i>
                    </button>
                </form>

                <div class="mt-3">
                    <p class="small text-light me-2">
                        <span th:text="#{signup.haveAccount}">Already have an account?</span>
                        <a th:href="@{/login}" class="text-decoration-none text-primary" th:text="#{signup.signIn}">Sign
                            In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
