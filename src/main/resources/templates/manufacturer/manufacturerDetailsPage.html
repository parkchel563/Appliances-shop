<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title th:text="#{manufacturers.edit.title}">Appliance Store - Edit Manufacturer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: main_header(${currentPage})}"></div>

<div class="auth-page-wrapper">
    <div class="auth-page-container">
        <div class="auth-form-wrapper">
            <div class="login-card text-center">
                <div class="alert alert-success mb-3" role="alert" th:if="${successMessage}">
                    <span th:text="#{${successMessage}}"></span>
                </div>

                <i class="bi bi-person-lines-fill login-icon"></i>
                <h2 class="mb-4" th:text="#{manufacturers.edit.home}">Edit manufacturer</h2>

                <form method="post"
                      th:action="@{/manufacturer/details/{id}(id=${manufacturerId})}"
                      th:object="${manufacturerUpdateDto}">

                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden">

                    <div class="mb-3 text-start">
                        <label class="form-label" for="name">
                            <i class="bi bi-building me-2"></i>
                            <span th:text="#{manufacturers.name}">Name</span>
                        </label>
                        <input
                                class="form-control"
                                id="name"
                                th:field="*{name}"
                                th:placeholder="#{manufacturers.name}"
                                type="text">
                        <div class="error-msg mt-1"
                             th:errors="*{name}"
                             th:if="${#fields.hasErrors('name')}"></div>
                    </div>

                    <button class="btn btn-primary w-100 mb-3" type="submit">
                        <span th:text="#{manufacturers.update.button}">Save Changes</span>
                        <i class="bi bi-check2-circle ms-2"></i>
                    </button>
                </form>

                <div class="mt-3">
                    <a class="text-decoration-none text-primary" th:href="@{/manufacturer}">
                        <span th:text="#{manufacturers.back}">Back to employees</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
