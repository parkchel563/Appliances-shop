<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title th:text="#{client.edit.title}">Appliance Store - Edit Employees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: main_header(${currentPage})}"></div>

<div class="auth-page-wrapper">
    <div class="auth-page-container">
        <div class="auth-form-wrapper">
            <div class="login-card text-center">
                <div class="alert alert-success mb-3" role="alert" th:if="${successMessage}">
                    <span th:text="#{${successMessage}}">Password generated successfully</span>
                </div>

                <div class="alert alert-warning mb-3" role="alert" th:if="${generatedPassword}">
                    <div class="fw-semibold mb-1" th:text="#{client.password.generated.value}">
                        Generated password:
                    </div>
                    <code th:text="${generatedPassword}">Abc123!x</code>
                </div>
                <i class="bi bi-person-lines-fill login-icon"></i>
                <h2 class="mb-4" th:text="#{employee.edit.heading}">Edit Employee</h2>

                <form method="post"
                      novalidate
                      th:action="@{/employees/details/{id}(id=${employeeId})}" th:object="${employeeUpdateProfileDto}">

                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden">

                    <div class="mb-3 text-start">
                        <label class="form-label" for="name">
                            <i class="bi bi-person me-2"></i>
                            <span th:text="#{employees.name}">Name</span>
                        </label>
                        <input
                                class="form-control"
                                id="name"
                                th:field="*{name}"
                                th:placeholder="#{employees.name}"
                                type="text">
                        <div class="error-msg mt-1"
                             th:errors="*{name}"
                             th:if="${#fields.hasErrors('name')}"></div>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label" for="email">
                            <i class="bi bi-envelope me-2"></i>
                            <span th:text="#{employees.email}">Email Address</span>
                        </label>
                        <input
                                class="form-control"
                                id="email"
                                placeholder="name@example.com"
                                th:field="*{email}"
                                type="email">
                        <div class="error-msg mt-1"
                             th:errors="*{email}"
                             th:if="${#fields.hasErrors('email')}"></div>
                    </div>

                    <div class="mb-4 text-start">
                        <label class="form-label" for="department">
                            <i class="bi bi-building me-2"></i>
                            <span th:text="#{employees.department}">Department</span>
                        </label>
                        <input
                                class="form-control"
                                id="department"
                                th:field="*{department}"
                                th:placeholder="#{employees.department}"
                                type="text">
                        <div class="error-msg mt-1"
                             th:errors="*{department}"
                             th:if="${#fields.hasErrors('department')}"></div>
                    </div>

                    <button class="btn btn-primary w-100 mb-3" type="submit">
                        <span th:text="#{employees.edit.submit}">Save Changes</span>
                        <i class="bi bi-check2-circle ms-2"></i>
                    </button>
                </form>
                <form class="mb-3"
                      method="post"
                      th:action="@{/employees/details/{id}/generate-password(id=${employeeId})}">
                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden">
                    <button class="btn btn-outline-warning w-100" type="submit">
                        <i class="bi bi-key me-2"></i>
                        <span th:text="#{employees.password.generate}">Generate Password</span>
                    </button>
                </form>

                <div class="mt-3">
                    <a class="text-decoration-none text-primary" th:href="@{/employees}">
                        <span th:text="#{employees.back}">Back to employees</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
