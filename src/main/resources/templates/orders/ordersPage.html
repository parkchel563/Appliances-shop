<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title th:text="#{orders.title}">Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: main_header('/orders')}"></div>
<div class="container appliances-wrapper">
    <div class="mx-auto" style="max-width: 1250px;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1" th:text="#{orders.heading}">Orders</h2>
                <p class="text-secondary mb-0" th:text="#{orders.description}">
                    Review all submitted customer orders
                </p>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-3 justify-content-end">
                <div th:replace="~{fragments/sorting :: toggle('id', #{sorting.id})}"></div>
                <div th:replace="~{fragments/sorting :: toggle('clientEmail', #{sorting.email})}"></div>
                <div th:replace="~{fragments/sorting :: toggle('total', #{sorting.price})}"></div>
            </div>
        </div>

        <div class="row g-4 align-items-start">
            <div class="col-12 col-lg-3">
                <form method="get" th:action="@{/orders}" th:object="${criteria}">
                    <div class="card appliance-item-card border-0 sticky-lg-top" style="top: 20px;">
                        <div class="card-body p-4">
                            <h5 class="mb-4 text-light">
                                <i class="bi bi-funnel me-2"></i>
                                <span th:text="#{filtering.title}">Filters</span>
                            </h5>

                            <div class="mb-3">
                                <label class="form-label text-secondary"
                                       th:text="#{filtering.label.search}">Search</label>
                                <input class="form-control bg-dark text-light border-secondary"
                                       th:field="*{id}"
                                       th:placeholder="#{filtering.order.id}"
                                       type="text">
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-secondary"
                                       th:text="#{filtering.label.search}">Search</label>
                                <input class="form-control bg-dark text-light border-secondary"
                                       th:field="*{employeeName}"
                                       th:placeholder="#{filtering.employee.name}"
                                       type="text">
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-secondary"
                                       th:text="#{filtering.label.search}">Search</label>
                                <input class="form-control bg-dark text-light border-secondary"
                                       th:field="*{clientName}"
                                       th:placeholder="#{filtering.client.name}"
                                       type="text">
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-secondary"
                                       th:text="#{filtering.label.status}">Status</label>
                                <select class="form-select bg-dark text-light border-secondary"
                                        th:field="*{status}">
                                    <option th:text="#{filtering.statuses}" value="">All Statuses</option>
                                    <option th:each="status : ${statuses}"
                                            th:text="#{order.status.__${status}__}"
                                            th:value="${status}">
                                    </option>
                                </select>
                            </div>

                            <div class="d-grid gap-2">
                                <button class="btn btn-primary" type="submit">
                                    <i class="bi bi-funnel me-2"></i>
                                    <span th:text="#{filtering.footer}">Filter</span>
                                </button>

                                <a class="btn btn-outline-light" th:href="@{/orders}">
                                    <i class="bi bi-arrow-counterclockwise me-2"></i>
                                    <span th:text="#{filtering.reset}">Reset</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="col-12 col-lg-9">
                <div class="auth-form-wrapper" th:if="${#lists.isEmpty(orders)}">
                    <div class="login-card text-center">
                        <i class="bi bi-inbox login-icon"></i>
                        <h3 class="mb-3" th:text="#{orders.empty}">No orders found</h3>
                        <p class="text-secondary mb-0" th:text="#{orders.empty.description}">
                            There are no orders to display at the moment
                        </p>
                    </div>
                </div>

                <div class="row g-4" th:if="${not #lists.isEmpty(orders)}">
                    <div class="col-12" th:each="order : ${orders}">
                        <div class="card appliance-item-card border-0">
                            <div class="card-body p-4">
                                <div class="d-flex flex-column flex-lg-row justify-content-between gap-4">

                                    <div class="flex-grow-1">
                                        <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                                            <span class="appliance-badge" th:text="'#' + ${order.id}">#1</span>
                                            <span class="badge rounded-pill bg-secondary"
                                                  th:text="#{order.status.__${order.status}__}">SUBMITTED</span>
                                        </div>

                                        <h5 class="mb-3 text-light">
                                            <i class="bi bi-person me-2 text-primary"></i>
                                            <span th:text="${order.clientName}">John Doe</span>
                                        </h5>

                                        <p class="text-secondary mb-2">
                                            <i class="bi bi-envelope me-2"></i>
                                            <span th:text="#{orders.clientEmail}">Client email</span>:
                                            <span class="text-light"
                                                  th:text="${order.clientEmail}">john@example.com</span>
                                        </p>

                                        <p class="text-secondary mb-0">
                                            <i class="bi bi-box-seam me-2"></i>
                                            <span th:text="#{orders.quantity}">Items</span>:
                                            <span class="text-light" th:text="${order.quantity}">3</span>
                                        </p>
                                    </div>

                                    <div class="d-flex flex-column align-items-lg-end justify-content-between gap-3">
                                        <div class="text-lg-end">
                                            <div class="text-secondary small mb-1" th:text="#{orders.total}">Total</div>
                                            <div class="fw-bold appliance-price" th:text="${order.total} + ' $'">250.00
                                                $
                                            </div>
                                        </div>

                                        <a class="btn btn-outline-light"
                                           th:href="@{/orders/details/{id}(id=${order.id})}">
                                            <i class="bi bi-eye me-2"></i>
                                            <span th:text="#{orders.details}">Details</span>
                                        </a>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/pagination :: controls(${ordersPage})}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
