<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title th:text="#{orders.myOrders}">My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: main_header('/my/orders')}"></div>
<div class="container appliances-wrapper">
    <div class="mx-auto" style="max-width: 1150px;">

        <div class="card appliance-item-card border-0 mb-4">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-4">
                    <div>
                        <h2 class="mb-2 text-light">
                            <i class="bi bi-bag-check me-2 text-primary"></i>
                            <span th:text="#{orders.myOrders}">My Orders</span>
                        </h2>
                        <p class="text-secondary mb-0">
                            <span th:text="#{orders.myOrders.description}">Track your order history, current statuses, and total amounts.</span>
                        </p>
                    </div>

                    <div class="d-flex flex-wrap gap-3">
                        <div class="text-center px-4 py-3 rounded-4 border"
                             style="min-width: 140px; border-color: rgba(255,255,255,0.08) !important; background: rgba(255,255,255,0.02);">
                            <div class="small text-secondary mb-1" th:text="#{orders.heading}">Orders</div>
                            <div class="fs-4 fw-bold text-light" th:text="${#lists.size(orders)}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-form-wrapper" th:if="${#lists.isEmpty(orders)}">
            <div class="login-card text-center">
                <i class="bi bi-bag-x login-icon"></i>
                <h3 class="mb-3" th:text="#{orders.empty}">No orders yet</h3>
                <p class="text-secondary mb-0" th:text="#{orders.empty.description}">You have not placed any orders
                    yet.</p>
            </div>
        </div>

        <div class="row g-4" th:if="${not #lists.isEmpty(orders)}">
            <div class="col-12" th:each="order : ${orders}">
                <div class="card appliance-item-card border-0 h-100">
                    <div class="card-body p-4">
                        <div class="d-flex flex-column flex-xl-row justify-content-between align-items-xl-center gap-4">

                            <div class="flex-grow-1">
                                <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                                    <span class="appliance-badge" th:text="'#' + ${order.id}">#1</span>

                                    <span class="badge rounded-pill px-3 py-2 border border-light-subtle text-light"
                                          th:if="${order.status == 'NEW'}"
                                          th:text="#{order.status.NEW}">
                                        NEW
                                    </span>

                                    <span class="badge rounded-pill px-3 py-2 border border-primary text-primary"
                                          th:if="${order.status == 'SUBMITTED'}"
                                          th:text="#{order.status.SUBMITTED}">
                                        SUBMITTED
                                    </span>

                                    <span class="badge rounded-pill px-3 py-2 border border-info text-info"
                                          th:if="${order.status == 'PROCESSING'}"
                                          th:text="#{order.status.PROCESSING}">
                                        PROCESSING
                                    </span>

                                    <span class="badge rounded-pill px-3 py-2 border border-warning text-warning"
                                          th:if="${order.status == 'READY'}"
                                          th:text="#{order.status.READY}">
                                        READY
                                    </span>

                                    <span class="badge rounded-pill px-3 py-2 border border-success text-success"
                                          th:if="${order.status == 'COMPLETED'}"
                                          th:text="#{order.status.COMPLETED}">
                                        COMPLETED
                                    </span>

                                    <span class="badge rounded-pill px-3 py-2 border border-danger text-danger"
                                          th:if="${order.status == 'CANCELED'}"
                                          th:text="#{order.status.CANCELED}">
                                        CANCELED
                                    </span>
                                </div>

                                <div class="row g-3">
                                    <div class="col-md-6 col-lg-4">
                                        <div class="small text-secondary mb-1">
                                            <i class="bi bi-hash me-1"></i>
                                            <span th:text="#{orders.myOrder.number}">Order number</span>
                                        </div>
                                        <div class="text-light fw-semibold" th:text="#{order.number} + ${order.id}">
                                            Order #1
                                        </div>
                                    </div>

                                    <div class="col-md-6 col-lg-4">
                                        <div class="small text-secondary mb-1">
                                            <i class="bi bi-clipboard-check me-1"></i>
                                            <span th:text="#{order.status.title}">Current status</span>
                                        </div>
                                        <div class="text-light fw-semibold"
                                             th:text="#{order.status.__${order.status}__}">
                                            SUBMITTED
                                        </div>
                                    </div>

                                    <div class="col-md-6 col-lg-4">
                                        <div class="small text-secondary mb-1">
                                            <i class="bi bi-cash-coin me-1"></i>
                                            <span th:text="#{order.details.total}">Total amount</span>
                                        </div>
                                        <div class="fw-bold appliance-price" th:text="${order.total} + ' $'">
                                            250.00 $
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex flex-column align-items-xl-end gap-3">
                                <a class="btn btn-outline-light px-4"
                                   th:href="@{/my/orders/{id}(id=${order.id})}">
                                    <i class="bi bi-eye me-2"></i>
                                    <span th:text="#{orders.details}">Details</span>
                                </a>

                                <div class="small text-secondary text-xl-end">
                                    <i class="bi bi-arrow-right-circle me-1"></i>
                                    <span th:text="#{order.details.review}">View full order information</span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/pagination :: controls(${ordersPage})}"></div>
    </div>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
